<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>BetaVerso</title>
  <link rel="icon" href="img/logo.png" type="image/png">

  <link rel="stylesheet" href="css/geral.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/conteiner.css">

</head>

<body>

<nav class="navbar">

  <div class="logo-container">
    <img src="./img/logo.png" alt="Logo BV">

    <div class="logo-text">
      <h1>BETAVERSO</h1>
      <span>|</span>
      <span>Universo Gamer</span>
    </div>
  </div>

  <div class="menu">
    <a href="./index.html">Inicio</a>
    <a href="./embreve.html">Mercado</a>
    <a href="./comunidade.html">Comunidade</a>
  </div>

  <div class="user-container">
    <button class="user-btn" onclick="irParaLogin()">
      <img src="./img/user.png" alt="Usuário">
    </button>
  </div>


  <script>
    function irParaLogin() {
      window.location.href = "embreve.html";
    }
  </script>
</nav>
  
<!-- INICIAL -->
  <section class="image-destaque">
    <img src="./img/voar.png" width="100%" alt="Destaque Beta">
  </section>


<!-- DESTAQUES DO UNIVERSO BETA -->
  <section class="canais">
  <div class="text">
    <h3>CANAIS</h3>            
  </div>  
  

    <div class="cards">

        <!-- YouTube -->
        <div class="card" data-link="https://www.youtube.com/@betaplay1">
            <div class="card-top">
                <img src="img/youtube.png" alt="YouTube">
            </div>

            <div class="card-content">
                <strong>Canal Betaplay</strong>
                <p>Live de todos os dias</p>
                <p>De segunda a sexta Rocket League</p>
                <p>Sábados de campeonatos RL</p>
                <p>Domingo com Live Aleatória</p>
            </div>
        </div>

        <!-- Discord -->
        <div class="card" data-link="https://discord.gg/qKUM8kFK">
            <div class="card-top">
                <img src="img/discord.png" alt="Discord">
            </div>

            <div class="card-content">
                <strong>Canal Betaplay</strong>
                <p>Call de qualidade</p>
            </div>
        </div>

        <!-- Imagem -->
        <div class="card image-card" data-link="https://www.youtube.com/@betaplay1">
            <img src="img/thumb.png" alt="Imagem destaque">
        </div>

    </div>
  </section>

<!-- PROJETO 4 MIL HORAS -->
  <section class="canais">
    <div class="text"><h3>AJUDE BETINHA A CHEGAR NAS 4 MIL HORAS</h3></div> 
    <!-- Imagem -->
        <div class="card image-card" data-link="https://www.youtube.com/watch?v=gnBbnv7tG2Q&list=PLx474AgFzLXIj5s97KVZdGb9ClTJ3_0DP">
            <img src="img/brawl.png" alt="Imagem destaque">
        </div>
  
  </section>

<!-- INICIAL -->
<script>
  document.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", () => {
        const link = card.getAttribute("data-link");
        window.open(link, "_blank");
    });
  });
</script>


</body>
</html>
